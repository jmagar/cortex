# cargo-deny configuration for cortex
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []                # check all targets
all-features = false
no-default-features = false

# ── Advisories ────────────────────────────────────────────────────────────────

[advisories]
version = 2
yanked = "deny"

# Known advisories we've reviewed and accepted:
ignore = [
  # RUSTSEC-2023-0071 — Marvin Attack (RSA timing side-channel) in the `rsa` crate.
  # Pulled in transitively: lab-auth → jsonwebtoken → rsa v0.9.10 / v0.10.0-rc.18.
  # Owner: cortex maintainer. Review cadence: every release; next review no later
  # than 2026-07-31 or when lab-auth/jsonwebtoken releases a hardened path.
  # No upstream fix exists yet (as of 2026-05). The RSA keys are used for JWT
  # signing/verification only (short-lived tokens, not long-term data encryption)
  # and the server is not on the PKCS#1 v1.5 decrypt path that is vulnerable.
  # REMOVE when lab-auth migrates to a hardened rsa path or a fix ships upstream.
  { id = "RUSTSEC-2023-0071", reason = "no fix available; JWT-only usage via lab-auth; not on PKCS#1 v1.5 decrypt path" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",                           # foldhash (via hashbrown → rusqlite → lab-auth)
  "CDLA-Permissive-2.0",            # webpki-roots / webpki-root-certs (via reqwest → rustls)
]
# Confidence threshold for license text detection (0.0–1.0)
confidence-threshold = 0.8

# ── Bans ──────────────────────────────────────────────────────────────────────

[bans]
# Duplicate versions are dominated by the transitive auth/MCP/Windows target
# stack and are reviewed during release dependency audits. Keep this check quiet
# so cargo-deny output highlights advisories, license drift, and source drift.
multiple-versions = "allow"
# Git deps with pinned revs have no semver version field, which cargo-deny
# treats as a wildcard. The rev is the pin; source policy below still restricts
# the allowed git remotes.
wildcards = "allow"
# Allow path deps (e.g. the self-referencing dev dep) to omit a version.
allow-wildcard-paths = true

# Crates we never want pulled in
deny = [
  # openssl (native) — this project uses rustls; openssl appearing means a dep
  # silently pulled in native SSL. Use the rustls feature flag instead.
  { name = "openssl" },
  { name = "openssl-sys" },
]

# Known duplicate version pairs that can't be resolved yet — remove when fixed
skip = []

skip-tree = []

# ── Sources ───────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  # lab-auth is vendored from the private lab mono-repo at a pinned rev
  "https://github.com/jmagar/lab.git",
]
