name: cortex

x-common-service: &common-service
  networks:
    - cortex
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  cortex:
    <<: *common-service
    # Default tag is kept in sync by scripts/bump-version.sh (version canon);
    # previously this was frozen at 1.0.0 while migrations moved forward —
    # a stale binary against a newer schema (full-review OH1).
    image: ghcr.io/jmagar/cortex:${CORTEX_VERSION:-1.26.1}
    container_name: cortex
    user: "${CORTEX_UID:-1000}:${CORTEX_GID:-1000}"
    env_file:
      - path: .env
        required: false
    environment:
      CORTEX_HOME: /cortex-home
      # Accept the Host header used by the Labby gateway when it proxies this
      # service over the docker network (parity with docker-compose.yml).
      CORTEX_ALLOWED_HOSTS: "cortex,cortex:3100"
    ports:
      # Syslog ingestion must be reachable by remote forwarders — published wide.
      - "${CORTEX_RECEIVER_HOST_PORT:-1514}:${CORTEX_RECEIVER_PORT:-1514}/udp"
      - "${CORTEX_RECEIVER_HOST_PORT:-1514}:${CORTEX_RECEIVER_PORT:-1514}/tcp"
      # MCP/API binds loopback by default (unauthenticated by default). The
      # Labby gateway uses the docker network. To expose deliberately, set
      # CORTEX_MCP_BIND=0.0.0.0 AND CORTEX_TOKEN.
      - "${CORTEX_MCP_BIND:-127.0.0.1}:${CORTEX_PORT:-3100}:3100/tcp"
    volumes:
      - ${CORTEX_HOME_VOLUME:-${HOME}/.cortex}:/cortex-home
      # Dedicated inventory key directory — never point this at ~/.ssh
      # (full-review SM2; see docker-compose.yml for details).
      - ${CORTEX_SSH_VOLUME:-${HOME}/.cortex/ssh}:/home/cortex/.ssh:ro
      - ${CORTEX_WORKSPACE_VOLUME:-${HOME}/workspace}:/home/cortex/workspace:ro
      - ${CORTEX_DATA_VOLUME:-cortex-data}:/data
      # Managed file-tail ingest can only read paths mounted under this root.
      # Point CORTEX_FILE_TAIL_LOG_VOLUME at /var/log, /mnt/user/appdata, or a
      # narrower log directory. Keep it read-only.
      - ${CORTEX_FILE_TAIL_LOG_VOLUME:-/var/log}:/file-tail-root:ro
    # The container listens on CORTEX_RECEIVER_PORT (default 1514). To serve host port
    # 514, set CORTEX_RECEIVER_HOST_PORT=514 while leaving CORTEX_RECEIVER_PORT at 1514, or add
    # host-level firewall/NAT redirects from 514 to 1514.
    # NET_BIND_SERVICE is only needed if the container itself binds port 514.
    # cap_add:
    #   - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          # Default 2G headroom: heavy `stats`/`sessions` aggregations over a
          # large DB can spike memory; 512M previously triggered OOM restarts.
          # Tune per-host via CORTEX_MEMORY_LIMIT (e.g. 1G, 4G).
          memory: ${CORTEX_MEMORY_LIMIT:-2G}
          cpus: '${CORTEX_CPU_LIMIT:-1.0}'

volumes:
  # Named volume with an explicit stable name — never gets project-prefixed, so
  # COMPOSE_PROJECT_NAME changes don't orphan the database.
  # To use a bind mount instead: set CORTEX_DATA_VOLUME=/absolute/host/path
  # To rename the volume:       set CORTEX_VOLUME_NAME=my-volume-name
  cortex-data:
    name: ${CORTEX_VOLUME_NAME:-cortex-data}

networks:
  cortex:
    name: ${DOCKER_NETWORK:-cortex}
    external: true
