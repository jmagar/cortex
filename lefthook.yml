#
# Hook strategy:
#   pre-commit is fast and staged-file-scoped. It should catch whitespace,
#   formatting, YAML, env-secret, plugin-skill, and local shape mistakes without
#   compiling the workspace on every commit.
#   pre-push delegates to `cargo xtask pre-push`, which is path-aware. The old
#   expensive all-targets/all-features suite remains available with
#   CORTEX_FULL_PRE_PUSH=1 and in CI.

pre-commit:
  parallel: true
  commands:
    diff_check:
      run: git --no-pager diff --check --cached
    yaml:
      glob: "*.{yml,yaml}"
      run: scripts/with_timeout.sh 30 -- uv run --with pyyaml python -c 'import sys, yaml; [yaml.safe_load(open(path, "r", encoding="utf-8")) for path in sys.argv[1:]]' {staged_files}
    rustfmt:
      glob: "**/*.rs"
      run: scripts/with_timeout.sh 30 -- cargo fmt -- --check {staged_files}
    module_size:
      glob: "**/*.rs"
      run: scripts/with_timeout.sh 30 -- bash scripts/check-rust-module-size.sh --limit 500 {staged_files}
    version_sync:
      glob: "{Cargo.toml,Cargo.lock,server.json,mcpb/manifest.json,docker-compose.prod.yml,CHANGELOG.md,release/components.toml}"
      run: scripts/with_timeout.sh 30 -- cargo xtask check-version-sync
    skills:
      glob: "{plugins/cortex/skills/**,.claude-plugin/**}"
      run: just validate-skills
    env_guard:
      run: scripts/with_timeout.sh 30 -- bash scripts/block-env-commits.sh

pre-push:
  parallel: false
  commands:
    pre-push-router:
      run: cargo xtask pre-push
