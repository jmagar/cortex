name: Bump lab-auth SHA

# Weekly SHA bump for the lab-auth dependency.
#
# NOTE: lab-auth is currently a path dependency (Cargo.toml: lab-auth = { path = "…" })
# while the OAuth epic branch is under development. `cargo update -p lab-auth` is a
# no-op for path deps — this workflow will produce a PR only after the dependency is
# switched to a git+rev reference per the TODO in Cargo.toml.
#
# Once migrated to git+rev, this workflow will run `cargo update -p lab-auth`, which
# fetches the latest commit from the lab repo's main branch and updates Cargo.lock.
# The resulting PR triggers CI, catching breakage before it reaches production.

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly, Monday 09:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check if lab-auth is a git dependency
        id: dep-check
        run: |
          if grep -q 'lab-auth.*git' Cargo.toml; then
            echo "is_git_dep=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_git_dep=false" >> "$GITHUB_OUTPUT"
            echo "lab-auth is still a path dep — skipping cargo update (no-op for path deps)"
          fi

      - name: Update lab-auth SHA
        if: steps.dep-check.outputs.is_git_dep == 'true'
        run: cargo update -p lab-auth

      - name: Run tests to verify update
        if: steps.dep-check.outputs.is_git_dep == 'true'
        run: cargo test --lib

      - name: Create PR if Cargo.lock changed
        if: steps.dep-check.outputs.is_git_dep == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump lab-auth SHA"
          title: "chore: bump lab-auth SHA (weekly)"
          body: |
            Automated weekly bump of the `lab-auth` git dependency SHA.

            Tests passed with the new SHA. Review and merge to keep the OAuth
            integration up to date with the upstream lab-auth crate.
          branch: "chore/bump-lab-auth-sha"
          delete-branch: true
