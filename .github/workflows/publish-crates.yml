name: Publish to crates.io

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Gate: run all CI checks before publishing. A broken build must never
  # reach crates.io. The publish job depends on this job succeeding.
  check:
    name: Pre-publish CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Install nextest
        run: cargo install cargo-nextest --locked

      - name: Run tests
        # nextest isolates env-mutating tests per-process (matches `just test`).
        run: env -u CORTEX_API_TOKEN -u NO_AUTH cargo nextest run --locked

      - name: Run doctests
        run: cargo test --doc --locked

      - name: Check version sync and changelog
        run: bash scripts/check-version-sync.sh --require-changelog

      - name: Verify tag matches Cargo.toml version
        run: |
          PKG_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --generate-notes
