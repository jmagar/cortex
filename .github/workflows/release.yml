name: release

# Triggered when release-please merges a release PR and pushes the resulting
# version tag (e.g. v1.16.1) — see .github/workflows/release-please.yml.
# Builds cortex for Linux + Windows, packages with SHA256 checksums, and
# attaches the artifacts to the GitHub Release release-please already created
# for that tag.
#
# Manual workflow_dispatch defaults to a dry-run that builds everything but skips
# artifact attachment. Pass publish=true only when intentionally publishing
# from an already-tagged ref.
#
# NOTE: cortex uses target-dir = ".cache/cargo" in .cargo/config.toml so all
# artifact paths use .cache/cargo/release/ instead of target/release/.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub Release for the tagged ref instead of dry-run only"
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # required to create releases

env:
  CARGO_TERM_COLOR: always
  # Disable the bash rustc-wrapper on CI — it's a local sccache shim that
  # doesn't exist on the runner and would break the build.
  CARGO_BUILD_RUSTC_WRAPPER: ""

jobs:
  cortex-linux:
    name: build cortex (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-cortex-linux
          cache-directories: .cache/cargo

      - name: cargo build --release --bin cortex
        run: cargo build --release --locked --bin cortex

      - name: Package
        run: |
          set -euo pipefail
          cd .cache/cargo/release
          tar -czf cortex-linux-x86_64.tar.gz cortex
          sha256sum cortex-linux-x86_64.tar.gz > cortex-linux-x86_64.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: cortex-linux-x86_64
          path: |
            .cache/cargo/release/cortex-linux-x86_64.tar.gz
            .cache/cargo/release/cortex-linux-x86_64.tar.gz.sha256
          if-no-files-found: error

  cortex-windows:
    name: build cortex (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-cortex-windows
          cache-directories: .cache/cargo

      - name: cargo build --release --bin cortex
        run: cargo build --release --locked --bin cortex

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location .cache/cargo/release
          Compress-Archive -Path cortex.exe -DestinationPath cortex-windows-x86_64.zip -Force
          $hash = (Get-FileHash cortex-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  cortex-windows-x86_64.zip" | Out-File -Encoding ascii cortex-windows-x86_64.zip.sha256
          Pop-Location

      - uses: actions/upload-artifact@v4
        with:
          name: cortex-windows-x86_64
          path: |
            .cache/cargo/release/cortex-windows-x86_64.zip
            .cache/cargo/release/cortex-windows-x86_64.zip.sha256
          if-no-files-found: error

  publish:
    name: publish github release
    needs: [cortex-linux, cortex-windows]
    runs-on: ubuntu-latest
    # Tag pushes publish automatically. workflow_dispatch stays dry-run unless
    # a human explicitly passes publish=true on a tagged ref.
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || github.event.inputs.publish == 'true')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      # release-please already created the GitHub Release for this tag (with
      # its own changelog-derived notes) before this workflow's push-tag
      # trigger fired. Deliberately omit generate_release_notes here — it
      # would overwrite that body with GitHub's generic auto-generated notes.
      # This step only attaches the built artifacts to the existing release
      # (or creates one, for a manual workflow_dispatch on an untagged ref).
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cortex-linux-x86_64.tar.gz
            dist/cortex-linux-x86_64.tar.gz.sha256
            dist/cortex-windows-x86_64.zip
            dist/cortex-windows-x86_64.zip.sha256
          fail_on_unmatched_files: true
