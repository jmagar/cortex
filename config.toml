# cortex configuration
# Env vars override these values. See .env.example for the full list.

[receiver]
# Use 1514 to avoid needing root/CAP_NET_BIND_SERVICE for port 514
# iptables redirect 514 -> 1514 (see docs/SETUP.md)
host = "0.0.0.0"
port = 1514
max_message_size = 8192
batch_size = 100
flush_interval = 500
write_channel_capacity = 10000

[storage]
# Local dev uses the repo's writable data/ directory. Docker uses env/defaults.
db_path = "data/cortex.db"
pool_size = 8               # matches code default; headroom for the graph projection scheduler
retention_days = 90         # 0 = keep forever
wal_mode = true
max_db_size_mb = 1024       # 0 = disable DB logical-size guard
recovery_db_size_mb = 900   # cleanup target after DB-size breach
min_free_disk_mb = 512      # 0 = disable free-disk guard
recovery_free_disk_mb = 768 # cleanup target after free-disk breach
cleanup_interval_secs = 60  # storage-budget enforcement interval

[mcp]
# Safety gate: if host is non-loopback (e.g. "0.0.0.0"), startup requires either
# CORTEX_TOKEN (static bearer) or CORTEX_AUTH_MODE=oauth to be set.
# Binding to a non-loopback address without auth will cause startup to fail.
host = "0.0.0.0"
port = 3100
server_name = "cortex"
# Optional extra RMCP Host/Origin allow-lists for reverse proxies.
# allowed_hosts = ["syslog.example.com", "syslog.example.com:443"]
# allowed_origins = ["https://syslog.example.com"]

# ----------------------------------------------------------------------------
# OAuth / JWT authentication policy.
#
# Env vars:
#   CORTEX_AUTH_MODE              bearer (default) | oauth
#   CORTEX_PUBLIC_URL             required when mode=oauth
#   CORTEX_GOOGLE_CLIENT_ID       required when mode=oauth
#   CORTEX_GOOGLE_CLIENT_SECRET   required when mode=oauth
#   CORTEX_TOKEN                  static break-glass bearer (existing)
#
# Everything else below is TOML-only by design.
# ----------------------------------------------------------------------------
[mcp.auth]
# Bootstrap admin email permitted to log in via Google OAuth. This is the only
# config-backed OAuth email gate cortex passes into lab-auth in V1.
admin_email = ""
# Reserved for future config-backed multi-user enforcement. Keep empty in OAuth
# mode today; startup rejects non-empty values because cortex does not pass
# this list into lab-auth.
allowed_emails = []

# Path policy. Relative paths are resolved against the directory containing
# [storage].db_path at runtime startup.
sqlite_path = "auth.db"
key_path = "auth-jwt.pem"

# Token policy.
access_token_ttl_secs = 3600   # 1h
refresh_token_ttl_secs = 28800 # 8h (intentionally shorter than lab-auth's 30d default for read-only homelab)
auth_code_ttl_secs = 300       # 5m

# Per-process rate limits for OAuth endpoints.
# /register is not mounted, so only authorize_rpm applies.
authorize_rpm = 60

# When OAuth is active, also reject requests carrying CORTEX_TOKEN. Set
# to false to keep the static token as a break-glass path. Defaults to true.
disable_static_token_with_oauth = true

# Allowed redirect URIs for OAuth clients (loopback URIs are accepted
# implicitly by lab-auth).
allowed_client_redirect_uris = []

[docker_ingest]
enabled = false
reconnect_initial_ms = 1000
reconnect_max_ms = 30000

# Managed file-tail sources are runtime-managed in data/file-tails.json
# (parent directory of [storage].db_path). Configure with:
#   cortex file-tail add --id swag-access --path /file-tail-root/path/access.log --tag swag-access
# In Docker, mount host log directories read-only at /file-tail-root with
# CORTEX_FILE_TAIL_LOG_VOLUME.

[notifications]
# Dev template default: notifications off. Startup validation now rejects
# enabled=true with an empty apprise_urls (it would silently drop every firing),
# so enable this only alongside at least one apprise_urls delivery target.
enabled = false
apprise_url = "http://100.120.242.29:8766"
# Apprise notification delivery URLs. Add at least one to enable delivery.
# The dispatcher will silently no-op if empty (startup validation rejects
# enabled=true with an empty list — set enabled=false if intentionally skipping).
# Examples:
#   "gotify://gotify.tootie.tv/<token>"
#   "ntfy://ntfy.sh/my-channel"
#   "tgram://<bot-token>/<chat-id>"
apprise_urls = []
dispatcher_interval_secs = 30
evaluator_interval_secs = 30
dedup_window_secs = 3600
max_retry_attempts = 8

[error_detection]
# Background scan that groups recurring warning/error logs into signatures and
# notifies on unacknowledged ones above frequency_threshold (per 1h window).
enabled = false
scan_interval_secs = 3600
max_rows_per_cycle = 50000
frequency_threshold = 30
# Case-insensitive message substrings whose log rows are skipped during
# scanning. Breaks the notification feedback loop: cortex POSTs to Apprise's
# /notify endpoint, Apprise logs the delivery, those logs are forwarded back
# into cortex and would otherwise be re-detected as recurring errors. Defaults
# cover Apprise's own delivery log lines. Set to [] to disable, or extend for
# other notification backends. Env: CORTEX_ERROR_DETECTION_EXCLUDE_PATTERNS
# (comma-separated).
exclude_patterns = [
    "Delivered Stateless Notification",
    "Sent Gotify notification",
    "POST /notify",
]
