name: cortex

# Local development stack. Builds from this checkout.
services:
  cortex:
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: cortex
    user: "${CORTEX_UID:-1000}:${CORTEX_GID:-1000}"
    env_file:
      - path: ${CORTEX_ENV_FILE:-.env}
        required: false
    ports:
      - "${CORTEX_RECEIVER_HOST_PORT:-1514}:${CORTEX_RECEIVER_PORT:-1514}/udp"
      - "${CORTEX_RECEIVER_HOST_PORT:-1514}:${CORTEX_RECEIVER_PORT:-1514}/tcp"
      - "${CORTEX_PORT:-3100}:3100/tcp"
    volumes:
      - ${CORTEX_DATA_VOLUME:-cortex-data}:/data
    networks:
      - cortex
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "dookie:100.88.16.79"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cortex-data:
    name: ${CORTEX_VOLUME_NAME:-cortex-data}

networks:
  cortex:
    name: ${DOCKER_NETWORK:-cortex}
    external: true
