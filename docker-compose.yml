name: syslog-mcp

# Local development stack. Builds from this checkout.
services:
  syslog-mcp:
    extends:
      file: docker-compose.prod.yml
      service: syslog-mcp
    image: syslog-mcp:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

volumes:
  syslog-mcp-data:

networks:
  syslog-mcp:
    name: ${DOCKER_NETWORK:-syslog-mcp}
    external: true
